version: "3.9"

services:
  # База данных
  postgres:
    image: postgres:16.4
    container_name: legal-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legalhub}
      POSTGRES_USER: ${POSTGRES_USER:-legalhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalhub_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Кэш и очереди
  redis:
    image: redis:7.4-alpine
    container_name: legal-hub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI бэкенд
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal-hub-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-legalhub}:${POSTGRES_PASSWORD:-legalhub_dev}@postgres:5432/${POSTGRES_DB:-legalhub}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # hot reload в dev-режиме
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js фронтенд
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal-hub-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # не перетирать node_modules хостовыми
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
